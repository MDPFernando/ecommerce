<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - Next Era Technologies</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
    <link rel="stylesheet" th:href="@{/theme.css}">
    <style>
        .track-container {
            max-width: 600px;
            margin: 4rem auto;
            padding: 3rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(14, 165, 233, 0.3);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.1);
        }
        .tracking-stepper {
            display: flex;
            justify-content: space-between;
            margin-top: 3rem;
            position: relative;
        }
        .tracking-stepper::before {
            content: '';
            position: absolute;
            top: 25px;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 1;
        }
        .step {
            position: relative;
            z-index: 2;
            text-align: center;
            flex: 1;
        }
        .step-icon {
            width: 50px;
            height: 50px;
            background: #1e293b;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            transition: all 0.5s ease;
        }
        .step.active .step-icon {
            border-color: #0ea5e9;
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.5);
            background: rgba(14, 165, 233, 0.1);
        }
        .step.completed .step-icon {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }
        .step-label {
            font-size: 0.7rem;
            font-family: 'Orbitron', sans-serif;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .step.active .step-label { color: #fff; }
    </style>
</head>
<body>
    <header class="glass-header">
        <div class="logo-container">
            <a th:href="@{/}">
                <img th:src="@{/images/logo.png}" alt="Logo" class="brand-logo">
            </a>
            <div class="logo">NEXT ERA TECHNOLOGIES</div>
        </div>
        <nav>
            <ul>
                <li><a th:href="@{/}">Home</a></li>
                <li><a th:href="@{/products}">Products</a></li>
                <li><a th:href="@{/orders/track}" class="active">Tracking</a></li>
                <li><button id="themeToggle" class="theme-toggle"></button></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="track-container">
            <h2 style="font-family: 'Orbitron', sans-serif; color: #0ea5e9; text-align: center; margin-bottom: 2rem;">Order Tracking Link</h2>
            
            <form th:action="@{/orders/track}" method="get" style="display: flex; gap: 1rem; margin-bottom: 3rem;">
                <input type="text" name="query" placeholder="Order ID or Phone Number..." class="form-control" style="flex: 1; padding: 1rem; border-radius: 10px;">
                <button type="submit" class="btn" style="padding: 0 2rem;">TRACK</button>
            </form>

            <div th:if="${order}">
                <div style="background: rgba(255, 255, 255, 0.03); padding: 1.5rem; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05);">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                        <span style="color: var(--text-muted);">Order ID:</span>
                        <span th:text="'#' + ${order.id}" style="color: #0ea5e9; font-family: 'Orbitron', sans-serif;"></span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                        <span style="color: var(--text-muted);">Current Status:</span>
                        <strong th:text="${order.status}" style="color: #10b981;"></strong>
                    </div>
                </div>

                <div class="tracking-stepper">
                    <div th:class="${order.status == 'PROCESSING' ? 'step active' : 'step completed'}">
                        <div class="step-icon">⚙️</div>
                        <div class="step-label">Processing</div>
                    </div>
                    <div th:class="${order.status == 'PACKED' ? 'step active' : (order.status == 'PROCESSING' ? 'step' : 'step completed')}">
                        <div class="step-icon">📦</div>
                        <div class="step-label">Packed</div>
                    </div>
                    <div th:class="${order.status == 'DISPATCHED' ? 'step active' : (order.status == 'PROCESSING' || order.status == 'PACKED' ? 'step' : 'step completed')}">
                        <div class="step-icon">🚚</div>
                        <div class="step-label">Dispatched</div>
                    </div>
                    <div th:class="${order.status == 'OUT_FOR_DELIVERY' ? 'step active' : (order.status == 'PROCESSING' || order.status == 'PACKED' || order.status == 'DISPATCHED' ? 'step' : 'step completed')}">
                        <div class="step-icon">🚀</div>
                        <div class="step-label">Out for Delivery</div>
                    </div>
                    <div th:class="${order.status == 'DELIVERED' ? 'step active completed' : 'step'}">
                        <div class="step-icon">✅</div>
                        <div class="step-label">Delivered</div>
                    </div>
                </div>
            </div>

            <div th:if="${orders}">
                <h3 style="font-family: 'Orbitron', sans-serif; font-size: 1rem; color: #0ea5e9; margin-bottom: 1.5rem;">Multiple Orders Found:</h3>
                <div th:each="o : ${orders}" style="background: rgba(255,255,255,0.03); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <span th:text="'Order #' + ${o.id}" style="font-family: 'Orbitron', sans-serif;"></span><br>
                        <span th:text="${o.status}" style="font-size: 0.8rem; color: #10b981;"></span>
                    </div>
                    <a th:href="@{/orders/track(query=${o.id})}" class="btn" style="padding: 0.4rem 1rem; font-size: 0.8rem;">View</a>
                </div>
            </div>

            <div th:if="${query != null and order == null and orders == null}" style="text-align: center; padding: 2rem; color: #f87171;">
                No order found for the provided information.
            </div>
        </div>
    </main>

    <script th:src="@{/theme.js}"></script>
</body>
</html>
