<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offer Form - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css(v=3.0)}">
    <link rel="stylesheet" th:href="@{/theme.css(v=3.0)}">
    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    
    <link rel="icon" type="image/png" th:href="@{/images/logo.png(v=2)}">
    <link rel="shortcut icon" type="image/png" th:href="@{/images/logo.png(v=2)}">
</head>
<body class="admin-body">
    <header class="glass-header">
        <div class="logo-container" style="display: flex; align-items: center; gap: 1rem;">
            <a th:href="@{/}">
                <img th:src="@{/images/logo.png}" alt="Next Era Technologies Logo" class="brand-logo">
            </a>
            <h1 style="font-size: 1.2rem; margin: 0; color: #fff;">COMMAND CENTER</h1>
        </div>
        <nav>
            <ul>
                <li><a th:href="@{/}">Live Site</a></li>
                <li th:if="${session.loggedInUser != null}"><a th:href="@{/logout}">Sign Out</a></li>
                <li><button id="themeToggle" class="theme-toggle">☀️</button></li>
            </ul>
        </nav>
    </header>

    <div class="admin-container">
        <aside class="sidebar">
            <a th:href="@{/admin/dashboard}">📊 Dashboard</a>
            <a th:href="@{/admin/products}">📦 Inventory</a>
            <a th:href="@{/admin/categories}">📁 Categories</a>
            <a th:href="@{/admin/orders}">🚚 Orders</a>
            <a th:href="@{/admin/offers}" class="active">🎁 Offers</a>
        </aside>

        <main class="admin-main">
            <h1 style="font-family: 'Orbitron', sans-serif; color: #0ea5e9; margin-bottom: 2rem; text-align: center;">
                <span th:text="${offer.id != null ? 'Edit Offer' : 'Create New Offer'}"></span>
            </h1>
            
            <div class="offer-hub-container" style="max-width: 800px; margin: 0 auto; padding: 2.5rem; text-align: left;">
                <form th:action="@{/admin/offers/save}" th:object="${offer}" method="post">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="form-group">
                        <label for="title">Offer Title</label>
                        <input type="text" id="title" th:field="*{title}" class="form-control" placeholder="e.g., Tactical Acquisition Protocol" required style="background: rgba(0,0,0,0.2); border: 1px solid rgba(0, 212, 255, 0.3); color: #fff;">
                    </div>
                    
                    <div class="form-group">
                        <label for="discountText">Discount/Highlight Text</label>
                        <input type="text" id="discountText" th:field="*{discountText}" class="form-control" placeholder="e.g., 20% OVERRIDE" required style="background: rgba(0,0,0,0.2); border: 1px solid rgba(0, 212, 255, 0.3); color: #fff;">
                    </div>
                    
                    <div class="form-group" style="margin: 2.5rem 0; padding: 1.5rem; background: rgba(0, 212, 255, 0.03); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 16px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);">
                        <label for="product" style="display: flex; align-items: center; gap: 8px; color: #00d4ff; font-weight: 700; letter-spacing: 1px;">
                            <span style="font-size: 1.2rem;">🔗</span> Artifact Tether
                        </label>
                        <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem; margin-top: -0.5rem;">Securely link this promotional override to a specific artifact in the inventory matrix.</p>
                        <div style="position: relative;">
                            <select id="product" th:field="*{product.id}" class="form-control" style="background: rgba(10, 15, 30, 0.8); border: 1px solid var(--primary); color: #fff; font-family: 'Space Grotesk', sans-serif; padding-right: 40px; -webkit-appearance: none; appearance: none; cursor: pointer; font-size: 0.95rem; box-shadow: 0 0 10px rgba(0, 212, 255, 0.1);">
                                <option value="" style="background: #0a0f1e; color: #64748b;">-- No Artifact Linked (Manual Target URL Active) --</option>
                                <option th:each="prod : ${products}" th:value="${prod.id}" th:text="${prod.name}" style="background: #0a0f1e; color: #fff;"></option>
                            </select>
                            <div style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--primary);">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="6 9 12 15 18 9"></polyline>
                                </svg>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="description">Detailed Description</label>
                        <textarea id="description" th:field="*{description}" class="form-control" rows="3" placeholder="Detail the tactical advantages of this offer..." style="background: rgba(0,0,0,0.2); border: 1px solid rgba(0, 212, 255, 0.3); color: #fff;"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="imageUrl">Image URL</label>
                        <input type="text" id="imageUrl" th:field="*{imageUrl}" class="form-control" placeholder="https://..." required style="background: rgba(0,0,0,0.2); border: 1px solid rgba(0, 212, 255, 0.3); color: #fff;">
                    </div>
                    
                    <div class="form-group" id="targetUrlGroup">
                        <label for="targetUrl">Manual Target Link URL</label>
                        <input type="text" id="targetUrl" th:field="*{targetUrl}" class="form-control" placeholder="e.g., /products (Used only when no artifact is linked)" style="background: rgba(0,0,0,0.2); border: 1px solid rgba(0, 212, 255, 0.3); color: #fff;">
                    </div>

                    <div style="margin-top: 2rem; text-align: right;">
                        <a th:href="@{/admin/offers}" style="color: var(--text-muted); text-decoration: none; margin-right: 1.5rem;">Cancel</a>
                        <button type="submit" class="btn btn-primary">Deploy Protocol</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script th:src="@{/theme.js}"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        const productCatalog = [];
        /*[# th:each="prod : ${products}"]*/
            productCatalog.push({
                id: /*[[${prod.id}]]*/ 0,
                name: /*[[${prod.name}]]*/ '',
                description: /*[[${prod.description}]]*/ '',
                imageUrl: /*[[${prod.imageUrl}]]*/ ''
            });
        /*[/]*/
        
        const productSelect = document.getElementById('product');
        const targetUrlGroup = document.getElementById('targetUrlGroup');

        function toggleTargetUrl() {
            if (productSelect.value) {
                targetUrlGroup.style.display = 'none';
            } else {
                targetUrlGroup.style.display = 'block';
            }
        }

        // Initial check on load (for edit mode)
        toggleTargetUrl();
        
        productSelect.addEventListener('change', function() {
            toggleTargetUrl(); // Check visibility
            
            const selectedId = this.value;
            if (selectedId) {
                const product = productCatalog.find(p => p.id == selectedId);
                if (product) {
                    // Auto-sync artifact data
                    document.getElementById('title').value = product.name;
                    document.getElementById('description').value = product.description || '';
                    document.getElementById('imageUrl').value = product.imageUrl || '';
                    
                    // High-end visual feedback for synchronization
                    ['title', 'description', 'imageUrl'].forEach(id => {
                        const el = document.getElementById(id);
                        el.style.transition = 'box-shadow 0.3s ease';
                        el.style.boxShadow = '0 0 20px rgba(0, 212, 255, 0.9)';
                        setTimeout(() => {
                            el.style.boxShadow = 'none';
                        }, 800);
                    });
                }
            }
        });
        /*]]>*/
    </script>
</body>
</html>
