<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="chat">

    <!-- Floating Toggle Button -->
    <button id="chatToggle" class="chat-toggle-btn" title="Chat with NET AI">
        <img src="/images/ai-avatar.png" alt="NET AI" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">
        <span class="chat-ping"></span>
    </button>

    <!-- Chat Window -->
    <div id="chatWidget" class="chat-widget hidden">

        <!-- Header -->
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="chat-avatar">
                    <img src="/images/ai-avatar.png" alt="NET" style="width:100%;height:100%;border-radius:10px;object-fit:cover;">
                </div>
                <div>
                    <div class="chat-name">NET Assistant</div>
                    <div class="chat-status"><span class="status-dot"></span> Online · AI Powered</div>
                </div>
            </div>
            <button id="closeChat" class="chat-close-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

        <!-- Messages -->
        <div id="chatMessages" class="chat-messages">
            <div class="chat-date-divider"><span>Today</span></div>
            <div class="chat-bubble bot">
                <div class="bubble-avatar"><img src="/images/ai-avatar.png" alt="NET" style="width:100%;height:100%;border-radius:6px;object-fit:cover;"></div>
                <div class="bubble-content">
                    <p>Hello! I'm <strong>NET</strong> — your AI shopping assistant. 👋</p>
                    <p style="margin-top:6px">Ask me about products, prices, delivery, or anything else!</p>
                    <div class="bubble-time">Just now</div>
                </div>
            </div>
            <div class="chat-quick-replies">
                <button class="quick-reply" onclick="sendQuick('What products do you sell?')">🛒 Products</button>
                <button class="quick-reply" onclick="sendQuick('How does delivery work?')">🚚 Delivery</button>
                <button class="quick-reply" onclick="sendQuick('How to place an order?')">📦 Orders</button>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off">
            <button id="sendChat" class="chat-send-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </div>

        <div class="chat-footer-brand">Powered by NET AI · Next Era Technologies</div>
    </div>

    <script th:src="@{/chat.js(v=2)}"></script>

    <style>
        /* ── Toggle Button ── */
        .chat-toggle-btn {
            position: fixed; bottom: 32px; right: 32px;
            width: 62px; height: 62px; border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #0077aa);
            color: #000; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 0 0 rgba(0,212,255,0.4), 0 8px 30px rgba(0,212,255,0.35);
            z-index: 2000; transition: transform 0.3s, box-shadow 0.3s;
            animation: chatPulseRing 2.5s ease-out infinite;
        }
        .chat-toggle-btn:hover { transform: scale(1.12); box-shadow: 0 0 0 0 transparent, 0 12px 40px rgba(0,212,255,0.5); }
        @keyframes chatPulseRing {
            0%   { box-shadow: 0 0 0 0 rgba(0,212,255,0.4), 0 8px 30px rgba(0,212,255,0.35); }
            70%  { box-shadow: 0 0 0 14px rgba(0,212,255,0), 0 8px 30px rgba(0,212,255,0.35); }
            100% { box-shadow: 0 0 0 0 rgba(0,212,255,0), 0 8px 30px rgba(0,212,255,0.35); }
        }
        .chat-ping {
            position: absolute; top: 10px; right: 10px;
            width: 10px; height: 10px; border-radius: 50%;
            background: #00ff88; border: 2px solid #050508;
        }

        /* ── Chat Window ── */
        .chat-widget {
            position: fixed; bottom: 108px; right: 32px;
            width: 370px; height: 560px;
            background: rgba(6, 9, 20, 0.97);
            border: 1px solid rgba(0,212,255,0.18);
            border-radius: 24px;
            backdrop-filter: blur(30px);
            display: flex; flex-direction: column;
            z-index: 2000; overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,212,255,0.05) inset;
            animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .chat-widget.hidden { display: none; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Header ── */
        .chat-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1rem 1.2rem;
            background: linear-gradient(135deg, rgba(0,212,255,0.08), rgba(124,58,237,0.06));
            border-bottom: 1px solid rgba(0,212,255,0.1);
        }
        .chat-header-left { display: flex; align-items: center; gap: 12px; }
        .chat-avatar {
            width: 40px; height: 40px; border-radius: 12px;
            background: rgba(0,212,255,0.1);
            border: 1px solid rgba(0,212,255,0.2);
            display: flex; align-items: center; justify-content: center;
        }
        .chat-name { font-family: 'Orbitron', sans-serif; font-size: 0.82rem; font-weight: 700; color: #f0f4ff; }
        .chat-status { display: flex; align-items: center; gap: 5px; font-size: 0.7rem; color: #4a5568; margin-top: 2px; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #00ff88; display: inline-block; animation: blink 2s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .chat-close-btn {
            width: 32px; height: 32px; border-radius: 8px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
            color: #7b8db0; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .chat-close-btn:hover { background: rgba(239,68,68,0.1); color: #f87171; border-color: rgba(239,68,68,0.3); }

        /* ── Messages ── */
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 1rem 1.1rem; display: flex; flex-direction: column; gap: 10px;
            scrollbar-width: thin; scrollbar-color: rgba(0,212,255,0.2) transparent;
        }
        .chat-messages::-webkit-scrollbar { width: 3px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.2); border-radius: 3px; }

        .chat-date-divider {
            display: flex; align-items: center; gap: 10px;
            font-size: 0.65rem; color: #4a5568; text-transform: uppercase; letter-spacing: 1px; margin: 4px 0;
        }
        .chat-date-divider::before,.chat-date-divider::after { content:''; flex:1; height:1px; background: rgba(255,255,255,0.05); }

        .chat-bubble { display: flex; gap: 8px; align-items: flex-start; }
        .chat-bubble.user { flex-direction: row-reverse; }

        .bubble-avatar {
            width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
            background: linear-gradient(135deg, #00d4ff, #0077aa);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif; font-size: 0.65rem; font-weight: 900; color: #000;
        }

        .bubble-content {
            max-width: 76%; padding: 0.75rem 1rem;
            border-radius: 16px 16px 16px 4px;
            background: rgba(0,212,255,0.06);
            border: 1px solid rgba(0,212,255,0.1);
            font-size: 0.85rem; color: #c8d4e8; line-height: 1.5;
        }
        .chat-bubble.user .bubble-content {
            border-radius: 16px 16px 4px 16px;
            background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,119,170,0.1));
            border-color: rgba(0,212,255,0.2); color: #e8f4ff;
        }
        .bubble-content strong { color: #00d4ff; }
        .bubble-time { font-size: 0.62rem; color: #4a5568; margin-top: 6px; }

        /* typing dots */
        .typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
        .typing-indicator span {
            width: 6px; height: 6px; border-radius: 50%; background: #00d4ff; opacity: 0.4;
            animation: typingDot 1.2s ease-in-out infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingDot { 0%,80%,100%{opacity:0.4;transform:scale(1)} 40%{opacity:1;transform:scale(1.3)} }

        /* Quick replies */
        .chat-quick-replies { display: flex; gap: 6px; flex-wrap: wrap; padding-left: 36px; }
        .quick-reply {
            padding: 0.35rem 0.75rem; border-radius: 20px; font-size: 0.75rem;
            background: rgba(0,212,255,0.06); border: 1px solid rgba(0,212,255,0.15);
            color: #00d4ff; cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .quick-reply:hover { background: rgba(0,212,255,0.15); border-color: rgba(0,212,255,0.4); }

        /* ── Input ── */
        .chat-input-area {
            display: flex; gap: 8px; padding: 0.9rem 1rem;
            border-top: 1px solid rgba(0,212,255,0.08);
            background: rgba(0,0,0,0.3);
        }
        #chatInput {
            flex: 1; background: rgba(0,212,255,0.04); border: 1px solid rgba(0,212,255,0.12);
            border-radius: 12px; padding: 0.7rem 1rem; color: #f0f4ff;
            font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; outline: none;
            transition: border-color 0.3s;
        }
        #chatInput:focus { border-color: rgba(0,212,255,0.4); }
        #chatInput::placeholder { color: #4a5568; }
        .chat-send-btn {
            width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
            background: linear-gradient(135deg, #00d4ff, #0077aa);
            color: #000; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .chat-send-btn:hover { transform: scale(1.08); box-shadow: 0 0 20px rgba(0,212,255,0.4); }

        /* ── Footer ── */
        .chat-footer-brand {
            text-align: center; font-size: 0.6rem; color: #2d3748;
            padding: 0.5rem; letter-spacing: 0.5px;
        }
    </style>
</div>
</body>
</html>
