version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ecommerce-db
    restart: always
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: production_password_change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: ecommerce-web
    restart: always
    ports:
      - "80:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=db
      - DB_NAME=ecommerce
      - DB_USER=postgres
      - DB_PASSWORD=production_password_change_me
      # Optional: Add your Gemini API Key below to activate real AI chat
      # - GEMINI_API_KEY=YOUR_ACTUAL_API_KEY
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
